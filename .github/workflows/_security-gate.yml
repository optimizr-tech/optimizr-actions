name: _security-gate

on:
  workflow_call:
    inputs:
      runner_json:
        description: "JSON runner labels, e.g. [\"ubuntu-latest\"] or [\"self-hosted\",\"Linux\",\"security\"]"
        required: false
        type: string
        default: '["ubuntu-latest"]'
      scan_type:
        description: "Scan type: fs or image"
        required: false
        type: string
        default: fs
      scan_ref:
        description: "Filesystem target or fallback image reference"
        required: false
        type: string
        default: "."
      image_refs:
        description: "Whitespace/newline separated image references or IDs"
        required: false
        type: string
        default: ""
      severity:
        description: "Blocking severities"
        required: false
        type: string
        default: "HIGH,CRITICAL"
      ignore_unfixed:
        description: "Explicitly ignore vulnerabilities without fixes"
        required: false
        type: boolean
        default: false
      exceptions_file:
        description: "Optional Optimizr JSON exception policy"
        required: false
        type: string
        default: ""
      trivy_version:
        description: "Controlled Trivy release"
        required: false
        type: string
        default: "v0.70.0"
      db_max_age_hours:
        description: "Maximum vulnerability DB download age"
        required: false
        type: number
        default: 30
      evidence_dir:
        description: "Evidence directory"
        required: false
        type: string
        default: artifacts/security-gate
      artifact_name:
        description: "Uploaded evidence artifact name"
        required: false
        type: string
        default: security-gate-evidence
      retention_days:
        description: "Evidence retention period"
        required: false
        type: number
        default: 30

permissions:
  contents: read

jobs:
  security-gate:
    name: Blocking security gate
    runs-on: ${{ fromJSON(inputs.runner_json) }}
    timeout-minutes: 30
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run portable security gate
        uses: optimizr-tech/optimizr-actions/.github/actions/security-gate@v1
        with:
          scan_type: ${{ inputs.scan_type }}
          scan_ref: ${{ inputs.scan_ref }}
          image_refs: ${{ inputs.image_refs }}
          severity: ${{ inputs.severity }}
          ignore_unfixed: ${{ inputs.ignore_unfixed }}
          exceptions_file: ${{ inputs.exceptions_file }}
          trivy_version: ${{ inputs.trivy_version }}
          db_max_age_hours: ${{ inputs.db_max_age_hours }}
          evidence_dir: ${{ inputs.evidence_dir }}

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.evidence_dir }}
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
