name: Debug actionlint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch exact candidate
        env:
          CANDIDATE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git init -q "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" remote add origin https://github.com/optimizr-tech/optimizr-actions.git
          git -C "$GITHUB_WORKSPACE" fetch -q --depth=1 origin "$CANDIDATE_SHA"
          git -C "$GITHUB_WORKSPACE" checkout -q FETCH_HEAD

      - name: Run isolated actionlint
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            -w /repo \
            rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
