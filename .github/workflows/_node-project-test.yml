name: _node-project-test
on:
  workflow_call:
    inputs:
      projects_json:
        description: JSON array of up to ten Node project objects
        required: true
        type: string
      runner_json:
        description: JSON runner labels
        required: false
        type: string
        default: '["ubuntu-latest"]'
      node_version:
        description: Controlled Node.js version
        required: false
        type: string
        default: "20"
      pnpm_version:
        description: Controlled pnpm version
        required: false
        type: string
        default: "11"
      retention_days:
        description: Artifact retention period
        required: false
        type: number
        default: 7
permissions:
  contents: read
jobs:
  prepare:
    name: Validate Node project matrix
    runs-on: ${{ fromJSON(inputs.runner_json) }}
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Normalize bounded project matrix
        id: matrix
        shell: bash
        env:
          PROJECTS_JSON: ${{ inputs.projects_json }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import PurePosixPath
          import re

          MAX_PROJECTS = 10
          name_re = re.compile(r"^[A-Za-z0-9][A-Za-z0-9_.-]{0,79}$")
          script_re = re.compile(r"^[A-Za-z0-9][A-Za-z0-9:_-]{0,79}$")
          phase_fields = ("lint_script", "format_script", "typecheck_script", "test_script", "build_script")

          def relative(value, label):
              if not isinstance(value, str) or not value or len(value) > 512 or "\\" in value:
                  raise SystemExit(f"{label} must be a bounded repository-relative path")
              path = PurePosixPath(value)
              if path.is_absolute() or ".." in path.parts:
                  raise SystemExit(f"{label} must remain repository relative")
              return path.as_posix()

          projects = json.loads(os.environ["PROJECTS_JSON"])
          if not isinstance(projects, list) or not 1 <= len(projects) <= MAX_PROJECTS:
              raise SystemExit(f"projects_json must contain 1-{MAX_PROJECTS} projects")
          normalized = []
          names = set()
          for raw in projects:
              if not isinstance(raw, dict):
                  raise SystemExit("each project must be an object")
              name = raw.get("name")
              if not isinstance(name, str) or not name_re.fullmatch(name) or name in names:
                  raise SystemExit("project names must be unique bounded identifiers")
              names.add(name)
              manager = raw.get("package_manager")
              if manager not in {"npm", "pnpm"}:
                  raise SystemExit("package_manager must be npm or pnpm")
              item = {
                  "name": name,
                  "working_directory": relative(raw.get("working_directory", "."), "working_directory"),
                  "package_manager": manager,
                  "install": raw.get("install", True),
                  "lockfile": relative(raw.get("lockfile") or ("package-lock.json" if manager == "npm" else "pnpm-lock.yaml"), "lockfile"),
                  "artifact_paths": raw.get("artifact_paths", []),
              }
              if not isinstance(item["install"], bool):
                  raise SystemExit("install must be boolean")
              if not isinstance(item["artifact_paths"], list) or len(item["artifact_paths"]) > 20:
                  raise SystemExit("artifact_paths must be a list of at most 20 paths")
              item["artifact_paths"] = [relative(path, "artifact path") for path in item["artifact_paths"]]
              for field in phase_fields:
                  value = raw.get(field, "")
                  if value and (not isinstance(value, str) or not script_re.fullmatch(value)):
                      raise SystemExit(f"{field} must be a package-script identifier")
                  item[field] = value or ""
              normalized.append(item)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("matrix=" + json.dumps({"project": normalized}, separators=(",", ":")) + "\n")
          PY

  validate:
    name: Node validation (${{ matrix.project.name }})
    needs: prepare
    runs-on: ${{ fromJSON(inputs.runner_json) }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install pnpm
        if: matrix.project.package_manager == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: ${{ inputs.pnpm_version }}
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ inputs.node_version }}
      - name: Run bounded Node project validation
        uses: optimizr-tech/optimizr-actions/.github/actions/node-project-test@v1
        with:
          project_json: ${{ toJSON(matrix.project) }}
      - name: Upload project evidence and collected artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: node-project-${{ matrix.project.name }}
          path: artifacts/node-project/${{ matrix.project.name }}
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
