name: _quality-gate

# Concurrency: caller workflow only (CI_STANDARDS §8.1).

on:
  workflow_call:
    inputs:
      artifact_name:
        description: "Artifact name with normalized metrics JSON files"
        required: false
        type: string
        default: quality-gate-metrics
      thresholds_path:
        description: "Threshold config path"
        required: false
        type: string
        default: .quality-gate/thresholds.json
      post_comment:
        description: "Post PR comment using gh api"
        required: false
        type: boolean
        default: true
    secrets:
      OPTIMIZR_INFRA_OPS_READ_TOKEN:
        description: Org PAT for sparse checkout of scripts/quality_gate
        required: false

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup quality-gate scripts
        uses: optimizr-tech/optimizr-infra-ops/.github/actions/quality-gate-scripts@v1
        with:
          infra_ops_read_token: ${{ secrets.OPTIMIZR_INFRA_OPS_READ_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Download current metrics artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts/current
        continue-on-error: true

      - name: Resolve baseline
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/baseline
          run_id="$(gh run list --workflow "${{ github.workflow }}" --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty' || true)"
          if [ -n "${run_id:-}" ]; then
            gh run download "$run_id" -n "${{ inputs.artifact_name }}" -D artifacts/baseline || true
          fi

      - name: Compare and optionally comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          args=(--current artifacts/current --thresholds "${{ inputs.thresholds_path }}")
          if [ -f artifacts/baseline/metrics.json ]; then
            args+=(--baseline artifacts/baseline/metrics.json)
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ inputs.post_comment }}" = "true" ]; then
            PYTHONPATH="${{ github.workspace }}/_qg" python -m scripts.quality_gate.legacy_metrics "${args[@]}" \
              --repo "${{ github.repository }}" \
              --pr "${{ github.event.pull_request.number }}" \
              --head-sha "${GITHUB_SHA}" \
              --post
          else
            PYTHONPATH="${{ github.workspace }}/_qg" python -m scripts.quality_gate.legacy_metrics "${args[@]}" --head-sha "${GITHUB_SHA}"
          fi
