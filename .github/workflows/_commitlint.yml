# Reusable: commitlint on pull_request commit range.
# Consume: optimizr-tech/optimizr-infra-ops/.github/workflows/_commitlint.yml@v1
# Pass base_sha/head_sha from caller — github.event.pull_request is empty under workflow_call.

name: _commitlint

# Concurrency: caller workflow only (CI_STANDARDS §8.1).

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version"
        required: false
        type: string
        default: "22"
      install_command:
        description: "Install command (npm ci / npm install / skip)"
        required: false
        type: string
        default: "npm ci"
      config_path:
        description: "Path to commitlint config relative to repo root"
        required: false
        type: string
        default: "commitlint.config.cjs"
      base_sha:
        description: "PR base SHA (caller: github.event.pull_request.base.sha)"
        required: true
        type: string
      head_sha:
        description: "PR head SHA (caller: github.event.pull_request.head.sha)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        if: inputs.install_command != 'skip'
        run: ${{ inputs.install_command }}

      - name: Run commitlint on PR commits
        env:
          COMMITLINT_CONFIG: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          BASE_SHA="${{ inputs.base_sha }}"
          HEAD_SHA="${{ inputs.head_sha }}"
          if [ ! -f "${COMMITLINT_CONFIG}" ] && [ ! -f ".commitlintrc.cjs" ]; then
            echo "No commitlint config — copy templates/commitlint.config.cjs from optimizr-infra-ops"
            exit 1
          fi
          npx --no-install commitlint --from="$BASE_SHA" --to="$HEAD_SHA" \
            || npx -y -p @commitlint/cli@21 -p @commitlint/config-conventional@21 commitlint --from="$BASE_SHA" --to="$HEAD_SHA"
