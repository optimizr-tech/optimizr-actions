name: Validate pull request

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate portable action contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Show Python version
        run: python3 --version

      - name: Verify repository boundary
        run: python3 -m unittest tests.test_repository_boundary -v

      - name: Verify deploy manifest writer
        run: python3 -m unittest tests.test_deploy_manifest_writer -v

      - name: Verify deploy manifest action
        run: python3 -m unittest tests.test_deploy_manifest_action -v

      - name: Verify PR validation policy
        run: python3 -m unittest tests.test_pr_validation_workflow -v

      - name: Run full Python contract suite
        run: |
          set -euo pipefail
          test_log="$RUNNER_TEMP/optimizr-unittest.log"
          if ! python3 -m unittest discover >"$test_log" 2>&1; then
            tail -n 160 "$test_log" >&2
            exit 1
          fi
          tail -n 8 "$test_log"
          python3 -m compileall -q scripts tests

      - name: Check candidate diff
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE_REF"
          git diff --check "origin/${BASE_REF}...HEAD"

      - name: Run actionlint
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            -w /repo \
            rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667

      - name: Validate composite action metadata
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            -w /repo \
            mikefarah/yq@sha256:76def1f56f456ecc1c3173ea275218ee17139bc2018c5a07887b15afd88ec03e \
            eval 'true' .github/actions/*/action.yml
