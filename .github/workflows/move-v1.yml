name: Validate and move v1 compatibility tag

# `v1` is the floating compatibility contract for backward-compatible changes.
# Push remains the normal path. pull_request_target:closed is used only as the
# recovery path when a merged commit contains a native GitHub skip instruction
# that suppresses the push-triggered workflow.

on:
  push:
    branches: [main]
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
      - "templates/**"
  pull_request_target:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  # A normal merge emits both push and pull_request_target:closed. Keep the
  # event paths independent so the lightweight recovery check cannot cancel the
  # normal push publication run before it determines whether recovery is needed.
  group: move-v1-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  scope:
    name: Resolve candidate contract revision
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      publish: ${{ steps.scope.outputs.publish }}
      target_sha: ${{ steps.scope.outputs.target_sha }}
    steps:
      - id: scope
        name: Detect portable-contract changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGED_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          publish=true
          target_sha="$EVENT_SHA"

          if [ "$EVENT_NAME" = "pull_request_target" ]; then
            target_sha="$MERGED_SHA"
            commit_message="$(
              gh api "repos/${GITHUB_REPOSITORY}/commits/${target_sha}" \
                --jq '.commit.message'
            )"
            normalized_message="$(printf '%s' "$commit_message" | tr '[:upper:]' '[:lower:]')"

            # The recovery event must publish only when GitHub's native skip
            # syntax suppressed the normal push workflow. Otherwise both event
            # paths would validate the same merge and one could appear failed or
            # cancelled even though v1 was published successfully.
            if ! printf '%s\n' "$normalized_message" \
              | grep -Eq '\[(skip ci|ci skip|no ci|skip actions|actions skip)\]|skip-checks:[[:space:]]*true'; then
              publish=false
            else
              changed_files="$(
                gh api --paginate \
                  "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
                  --jq '.[].filename'
              )"
              if printf '%s\n' "$changed_files" \
                | grep -Eq '^(\.github/actions/|\.github/workflows/|templates/)'; then
                publish=true
              else
                publish=false
              fi
            fi
          fi

          if [ -z "$target_sha" ]; then
            echo "::error::could not resolve target SHA" >&2
            exit 1
          fi

          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "Resolved candidate: publish=$publish target_sha=$target_sha"

  validate:
    name: Validate workflows and composite actions
    needs: [scope]
    if: needs.scope.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout validated candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.scope.outputs.target_sha }}
          persist-credentials: false

      - name: Run Python contract tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -v
          python3 -m compileall scripts tests

      - name: Run actionlint
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            -w /repo \
            rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667

      - name: Validate composite action metadata
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            -w /repo \
            mikefarah/yq@sha256:76def1f56f456ecc1c3173ea275218ee17139bc2018c5a07887b15afd88ec03e \
            eval 'true' .github/actions/*/action.yml

  move-v1:
    name: Move floating v1 tag
    needs: [scope, validate]
    if: needs.scope.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Move v1 to validated main HEAD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ needs.scope.outputs.target_sha }}
        run: |
          set -euo pipefail

          current_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq '.sha')"
          if [ "$current_main_sha" != "$TARGET_SHA" ]; then
            echo "::error::main advanced after validation; refusing to move v1 to stale SHA $TARGET_SHA" >&2
            exit 1
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/v1" >/dev/null 2>&1; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/git/refs/tags/v1" \
              -f sha="$TARGET_SHA" -F force=true
            echo "Moved v1 -> $TARGET_SHA"
          else
            gh api -X POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/v1" -f sha="$TARGET_SHA"
            echo "Created v1 -> $TARGET_SHA"
          fi
