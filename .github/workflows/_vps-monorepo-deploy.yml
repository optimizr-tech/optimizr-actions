name: _vps-monorepo-deploy

concurrency:
  group: deploy-${{ inputs.service_name }}-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      service_name:
        description: Repository/deploy directory name under /opt/optimizr
        required: true
        type: string
      container_name:
        description: Primary Docker container used for health verification
        required: true
        type: string
      runner_label:
        description: Short trusted self-hosted runner label
        required: true
        type: string
      compose_file:
        description: Compose file relative to the deployment directory
        required: false
        type: string
        default: docker-compose.yml
      pre_deploy_commands:
        description: Existing consumer-owned shell commands after synchronization
        required: false
        type: string
        default: ""
      services_build:
        description: Whitespace-separated required services to build
        required: false
        type: string
        default: ""
      services_build_optional:
        description: Whitespace-separated optional services to build
        required: false
        type: string
        default: ""
      services_up:
        description: Whitespace-separated services to roll out
        required: false
        type: string
        default: ""
      compose_up_flags:
        description: Existing caller-owned extra Compose up flags
        required: false
        type: string
        default: ""
      post_deploy_commands:
        description: Existing consumer-owned shell commands after health verification
        required: false
        type: string
        default: ""
      health_timeout:
        description: Seconds to wait for the primary container to become healthy
        required: false
        type: number
        default: 120
      ensure_networks:
        description: Whitespace-separated Docker networks to ensure
        required: false
        type: string
        default: optimizr_infra
      ensure_volumes:
        description: Whitespace-separated Docker volumes to ensure
        required: false
        type: string
        default: ""
      run_prune:
        description: Run Docker and runner cleanup after deployment
        required: false
        type: boolean
        default: true
      image_age_threshold:
        description: Docker age filter used by image prune
        required: false
        type: string
        default: 168h
      timeout_minutes:
        description: Maximum deployment job duration
        required: false
        type: number
        default: 20
      security_require_image_scan:
        description: Require scanning built Compose images before rollout
        required: false
        type: boolean
        default: true
      security_severity:
        description: Blocking Trivy severities
        required: false
        type: string
        default: HIGH,CRITICAL
      security_ignore_unfixed:
        description: Ignore vulnerabilities without an available fix
        required: false
        type: boolean
        default: false
      security_exceptions_file:
        description: Reviewed expiring security exceptions JSON
        required: false
        type: string
        default: ""
      security_trivy_version:
        description: Controlled Trivy release
        required: false
        type: string
        default: v0.70.0
      security_db_max_age_hours:
        description: Maximum accepted vulnerability database age
        required: false
        type: number
        default: 30
      deploy_manifest_enabled:
        description: Record sanitized immutable success/failure manifests
        required: false
        type: boolean
        default: false
      deploy_manifest_retention:
        description: Immutable deploy manifests retained on the VPS
        required: false
        type: number
        default: 50
      deploy_manifest_migration_result:
        description: passed, failed, skipped or not-reported
        required: false
        type: string
        default: not-reported

jobs:
  deploy:
    runs-on: [self-hosted, Linux, ${{ inputs.runner_label }}]
    timeout-minutes: ${{ inputs.timeout_minutes }}
    environment:
      name: production
    env:
      DEPLOY_PATH: /opt/optimizr/${{ inputs.service_name }}
      CONTAINER_NAME: ${{ inputs.container_name }}
      COMPOSE_FILE: ${{ inputs.compose_file }}
      HEALTH_TIMEOUT: ${{ inputs.health_timeout }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Security gate (filesystem)
        uses: optimizr-tech/optimizr-actions/.github/actions/security-gate@v1
        with:
          scan_type: fs
          scan_ref: .
          severity: ${{ inputs.security_severity }}
          ignore_unfixed: ${{ inputs.security_ignore_unfixed }}
          exceptions_file: ${{ inputs.security_exceptions_file }}
          trivy_version: ${{ inputs.security_trivy_version }}
          db_max_age_hours: ${{ inputs.security_db_max_age_hours }}
          evidence_dir: artifacts/security-gate

      - name: Backup and synchronize files
        shell: bash
        run: |
          set -euo pipefail
          BACKUP_ROOT="/opt/optimizr/backups/${{ inputs.service_name }}/deploys"
          sudo mkdir -p "$DEPLOY_PATH" "$BACKUP_ROOT"
          sudo chown -R "$(id -un):$(id -gn)" "$DEPLOY_PATH" "$BACKUP_ROOT"
          sudo chmod 750 "$BACKUP_ROOT"

          if [ -d "$DEPLOY_PATH" ] && [ "$(ls -A "$DEPLOY_PATH" 2>/dev/null)" ]; then
            backup_file="${BACKUP_ROOT}/$(date -u +%Y%m%dT%H%M%SZ).tar.gz"
            if (
              umask 077
              tar \
                --exclude='.env' --exclude='*/.env' \
                --exclude='.env.*' --exclude='*/.env.*' \
                --exclude='*.pem' --exclude='*.key' \
                --exclude='*.p12' --exclude='*.pfx' \
                -czf "$backup_file" -C "$DEPLOY_PATH" . 2>/dev/null
            ); then
              chmod 600 "$backup_file"
            else
              rm -f "$backup_file"
              echo "::warning::Configuration backup failed; deployment continues"
            fi
          fi

          rsync_args=(
            -a --delete
            --exclude=.git
            --exclude=.github
            --exclude=.env
            --exclude='*.tar.gz'
            --exclude=backup/
          )
          if [ -f "$GITHUB_WORKSPACE/.deployignore" ]; then
            rsync_args+=(--exclude-from="$GITHUB_WORKSPACE/.deployignore")
          fi
          rsync "${rsync_args[@]}" "$GITHUB_WORKSPACE/" "$DEPLOY_PATH/"
          find "$DEPLOY_PATH" -name '*.sh' -exec chmod +x {} \;

      - name: Ensure networks and volumes exist
        if: inputs.ensure_networks != '' || inputs.ensure_volumes != ''
        shell: bash
        run: |
          set -euo pipefail
          for network in ${{ inputs.ensure_networks }}; do
            sudo docker network inspect "$network" >/dev/null 2>&1 || sudo docker network create "$network"
          done
          for volume in ${{ inputs.ensure_volumes }}; do
            sudo docker volume inspect "$volume" >/dev/null 2>&1 || sudo docker volume create "$volume"
          done

      - name: Pre-deploy commands
        if: inputs.pre_deploy_commands != ''
        shell: bash
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          ${{ inputs.pre_deploy_commands }}

      - name: Build required services
        if: inputs.services_build != ''
        shell: bash
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          for service in ${{ inputs.services_build }}; do
            sudo docker compose -f "$COMPOSE_FILE" build --no-cache "$service"
          done

      - name: Build optional services
        id: optional-builds
        if: inputs.services_build_optional != ''
        shell: bash
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          failed=0
          for service in ${{ inputs.services_build_optional }}; do
            if ! sudo docker compose -f "$COMPOSE_FILE" build --no-cache "$service"; then
              echo "::warning title=${service} build failed::Keeping previous image"
              failed=1
            fi
          done
          if [ "$failed" -eq 0 ]; then
            echo 'result=passed' >> "$GITHUB_OUTPUT"
          else
            echo 'result=failed' >> "$GITHUB_OUTPUT"
          fi

      - name: Discover declarative Compose images
        id: security-images
        if: inputs.security_require_image_scan
        shell: bash
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          mapfile -t configured_images < <(
            sudo docker compose -f "$COMPOSE_FILE" config --images | sed '/^$/d' | sort -u
          )
          [ "${#configured_images[@]}" -gt 0 ] || {
            echo "::error::No Compose images available for required security scan" >&2
            exit 1
          }
          image_ids=()
          for image_ref in "${configured_images[@]}"; do
            image_id="$(sudo docker image inspect --format '{{.Id}}' "$image_ref" 2>/dev/null || true)"
            [ -n "$image_id" ] || {
              echo "::error::Configured image unavailable after build: $image_ref" >&2
              exit 1
            }
            image_ids+=("$image_id")
          done
          mapfile -t image_ids < <(printf '%s\n' "${image_ids[@]}" | sort -u)
          {
            echo 'refs<<OPTIMIZR_IMAGES'
            printf '%s\n' "${image_ids[@]}"
            echo OPTIMIZR_IMAGES
          } >> "$GITHUB_OUTPUT"

      - name: Security gate (images)
        if: inputs.security_require_image_scan
        uses: optimizr-tech/optimizr-actions/.github/actions/security-gate@v1
        with:
          scan_type: image
          image_refs: ${{ steps.security-images.outputs.refs }}
          severity: ${{ inputs.security_severity }}
          ignore_unfixed: ${{ inputs.security_ignore_unfixed }}
          exceptions_file: ${{ inputs.security_exceptions_file }}
          trivy_version: ${{ inputs.security_trivy_version }}
          db_max_age_hours: ${{ inputs.security_db_max_age_hours }}
          evidence_dir: artifacts/security-gate

      - name: Roll out services
        if: inputs.services_up != ''
        shell: bash
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          sudo docker compose -f "$COMPOSE_FILE" up -d ${{ inputs.compose_up_flags }} ${{ inputs.services_up }}

      - name: Wait for healthcheck
        shell: bash
        run: |
          set -euo pipefail
          elapsed=0
          while [ "$elapsed" -lt "$HEALTH_TIMEOUT" ]; do
            status="$(sudo docker inspect -f '{{.State.Health.Status}}' "$CONTAINER_NAME" 2>/dev/null || echo 'not found')"
            if [ "$status" = healthy ]; then
              echo "$CONTAINER_NAME is healthy"
              exit 0
            fi
            if [ "$status" = 'not found' ] || [ -z "$status" ]; then
              sudo docker logs --tail=50 "$CONTAINER_NAME" >&2 || true
              exit 1
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done
          sudo docker logs --tail=50 "$CONTAINER_NAME" >&2 || true
          exit 1

      - name: Post-deploy commands
        if: inputs.post_deploy_commands != ''
        shell: bash
        run: |
          set -euo pipefail
          ${{ inputs.post_deploy_commands }}

      - name: Verify deployment
        shell: bash
        run: |
          set -euo pipefail
          for _ in 1 2 3; do
            running="$(sudo docker inspect -f '{{.State.Running}}' "$CONTAINER_NAME" 2>/dev/null || echo false)"
            health="$(sudo docker inspect -f '{{.State.Health.Status}}' "$CONTAINER_NAME" 2>/dev/null || echo none)"
            if [ "$running" = true ] && [ "$health" = healthy ]; then
              exit 0
            fi
            sleep 2
          done
          sudo docker logs --tail=50 "$CONTAINER_NAME" >&2 || true
          exit 1

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-gate-${{ inputs.service_name }}-${{ github.run_id }}
          path: artifacts/security-gate
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup runner and Docker leftovers
        if: always() && inputs.run_prune
        shell: bash
        env:
          IMAGE_AGE: ${{ inputs.image_age_threshold }}
        run: |
          set -euo pipefail
          sudo docker container prune -f
          sudo docker image prune -f
          sudo docker image prune -af --filter "until=${IMAGE_AGE}"
          sudo docker builder prune -f
          if [ -n "${RUNNER_WORKSPACE:-}" ]; then
            runner_root="$(dirname "$RUNNER_WORKSPACE")"
            sudo find "$runner_root/_temp" -mindepth 1 -maxdepth 1 -mmin +60 -exec rm -rf {} + 2>/dev/null || true
          fi

      - name: Clean runner workspace
        if: always() && !inputs.run_prune
        shell: bash
        run: sudo find "$GITHUB_WORKSPACE" -mindepth 1 -delete

      - name: Checkout coherent deploy-manifest recorder
        if: always() && inputs.deploy_manifest_enabled
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .optimizr-actions-manifest
          persist-credentials: false

      - name: Record sanitized deployment manifest
        if: always() && inputs.deploy_manifest_enabled
        uses: ./.optimizr-actions-manifest/.github/actions/record-deploy-manifest
        with:
          deploy_path: ${{ env.DEPLOY_PATH }}
          compose_file: ${{ inputs.compose_file }}
          container_name: ${{ inputs.container_name }}
          services: ${{ inputs.services_up }}
          docker_mode: sudo
          status: ${{ job.status == 'success' && 'success' || 'failure' }}
          migration_result: ${{ inputs.deploy_manifest_migration_result }}
          optional_build_result: ${{ steps.optional-builds.outputs.result != '' && steps.optional-builds.outputs.result || 'skipped' }}
          retention: ${{ inputs.deploy_manifest_retention }}
