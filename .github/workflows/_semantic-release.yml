# Reusable: semantic-release with a dry-run and optional release badge update.
# Consume via: uses: optimizr-tech/optimizr-actions/.github/workflows/_semantic-release.yml@<immutable-sha>

name: _semantic-release

# Concurrency belongs to the caller release.yml. Repeating the same concurrency
# group in a reusable workflow can deadlock workflow_call executions.

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version (semantic-release v25+ requires >=22.14)"
        required: false
        type: string
        default: "22.14"
      install_command:
        description: "Dependency install command"
        required: false
        type: string
        default: "npm ci"
      semantic_release_version:
        description: "semantic-release version installed in the ephemeral runtime"
        required: false
        type: string
        default: "25.0.5"
      semantic_release_extra_packages:
        description: "Optional extra semantic-release runtime packages, separated by spaces"
        required: false
        type: string
        default: ""
      runs_on:
        description: "Runner JSON array, for example ['self-hosted', 'Linux', 'service']"
        required: false
        type: string
        default: '["self-hosted"]'
      releaserc_source:
        description: "local uses the caller .releaserc.json; canonical downloads the optimizr-actions template"
        required: false
        type: string
        default: "local"
      actions_ref:
        description: "Tag or immutable SHA used for the canonical optimizr-actions releaserc"
        required: false
        type: string
        default: "main"
      update_release_badge:
        description: "Update assets/badges/release.svg after semantic-release completes"
        required: false
        type: boolean
        default: false
      skip:
        description: "Explicitly skip release by caller policy; [skip-tests] never controls releases"
        required: false
        type: boolean
        default: false
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    # Test bypass markers are intentionally ignored here. Release is a separate,
    # self-hosted stage and semantic-release decides whether a version is due.
    if: ${{ !inputs.skip }}
    name: Release
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        run: ${{ inputs.install_command }}

      - name: Resolve canonical releaserc
        if: inputs.releaserc_source == 'canonical'
        env:
          REF: ${{ inputs.actions_ref }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DEST=".releaserc.json"

          gh api -H "Accept: application/vnd.github.raw" \
            "repos/optimizr-tech/optimizr-actions/contents/templates/.releaserc.json?ref=${REF}" \
            > "$DEST"
          echo "Using canonical releaserc from optimizr-actions@${REF}"

      - name: Install semantic-release runtime
        env:
          SEMANTIC_RELEASE_VERSION: ${{ inputs.semantic_release_version }}
          SEMANTIC_RELEASE_EXTRA_PACKAGES: ${{ inputs.semantic_release_extra_packages }}
        run: |
          set -euo pipefail
          if [[ ! -f .releaserc.json ]]; then
            echo "::error::.releaserc.json not found"
            exit 1
          fi

          mapfile -t plugin_packages < <(
            node -e "const fs=require('fs'); const cfg=JSON.parse(fs.readFileSync('.releaserc.json','utf8')); const plugins=Array.isArray(cfg.plugins)?cfg.plugins:[]; const names=plugins.map((plugin)=>Array.isArray(plugin)?plugin[0]:plugin).filter((plugin)=>typeof plugin==='string').filter((plugin)=>!/^[./]/.test(plugin)); process.stdout.write([...new Set(names)].join('\\n'));"
          )

          install_packages=("semantic-release@${SEMANTIC_RELEASE_VERSION}")
          for pkg in "${plugin_packages[@]}"; do
            [[ -n "$pkg" ]] && install_packages+=("$pkg")
          done

          if [[ -n "${SEMANTIC_RELEASE_EXTRA_PACKAGES}" ]]; then
            # shellcheck disable=SC2206
            extra_packages=(${SEMANTIC_RELEASE_EXTRA_PACKAGES})
            install_packages+=("${extra_packages[@]}")
          fi

          printf 'Installing semantic-release runtime packages:\n%s\n' "${install_packages[@]}"
          npm install --no-save --package-lock=false --no-audit --no-fund "${install_packages[@]}"

      - name: Verify release plan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx semantic-release --dry-run

      - name: Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx semantic-release

  update-release-badge:
    name: Update release badge
    needs: release
    if: ${{ inputs.update_release_badge && needs.release.result == 'success' }}
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout released branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ github.token }}

      - name: Sync branch after semantic-release
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git checkout "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"

      - name: Resolve latest semantic version tag
        id: tag
        run: |
          set -euo pipefail
          git fetch --tags origin
          VERSION=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [[ -z "$VERSION" ]]; then
            echo "No semantic version tag found; badge update is a no-op"
            exit 0
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update badge
        if: steps.tag.outputs.version != ''
        uses: optimizr-tech/optimizr-actions/.github/actions/update-release-badge@10c7623bf2a5fb1db1d0e11f3b21e00ae6d442a1
        with:
          version: ${{ steps.tag.outputs.version }}
