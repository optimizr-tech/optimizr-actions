name: _quality-gate-pr

# Compare PR artifacts against main baseline and post idempotent comment.
# Presets: python-backend | monorepo-serve.

on:
  workflow_call:
    inputs:
      preset:
        description: "Artifact layout preset: python-backend | monorepo-serve"
        required: true
        type: string
      workflow_file:
        description: Caller workflow filename for baseline lookup (e.g. ci.yml)
        required: false
        type: string
        default: ci.yml
      infra_ops_ref:
        description: optimizr-infra-ops ref for scripts
        required: false
        type: string
        default: v1
      fail_on_red:
        description: Fail job when comparator returns red (exit 2)
        required: false
        type: boolean
        default: true
      post_comment:
        description: Upsert PR comment via gh api
        required: false
        type: boolean
        default: true
    secrets:
      OPTIMIZR_INFRA_OPS_READ_TOKEN:
        description: Org PAT for sparse checkout of scripts/quality_gate
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  quality-gate-pr:
    name: Quality gate (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout caller
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup quality-gate scripts
        uses: optimizr-tech/optimizr-infra-ops/.github/actions/quality-gate-scripts@v1
        with:
          infra_ops_ref: ${{ inputs.infra_ops_ref }}
          infra_ops_read_token: ${{ secrets.OPTIMIZR_INFRA_OPS_READ_TOKEN }}

      - name: Download PR run artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
        continue-on-error: true

      - name: Find latest main baseline run
        id: baseline-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}/_qg
        run: |
          set -euo pipefail
          payload="$(python -m scripts.quality_gate.collect_ci_run latest-main --workflow "${{ inputs.workflow_file }}" || echo null)"
          if [ "$payload" = "null" ] || [ -z "$payload" ]; then
            echo "no main baseline yet -- comparator will report unknown"
            echo "run-id=" >> "$GITHUB_OUTPUT"
          else
            run_id="$(printf '%s' "$payload" | python -c 'import json,sys; print(json.load(sys.stdin)["run_id"])')"
            echo "found main baseline run $run_id"
            echo "run-id=$run_id" >> "$GITHUB_OUTPUT"
          fi

      - name: Download main baseline artifact
        if: steps.baseline-run.outputs.run-id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/baseline
          gh run download "${{ steps.baseline-run.outputs.run-id }}" \
            -n quality-gate-baseline \
            -D artifacts/baseline \
            || echo "baseline artifact missing or expired -- treating as first run"

      - name: Compare and post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}/_qg
        run: |
          set -euo pipefail
          baseline_arg=""
          if [ -f artifacts/baseline/quality-gate-baseline.json ]; then
            baseline_arg="--baseline artifacts/baseline/quality-gate-baseline.json"
          fi
          post_arg=""
          if [ "${{ inputs.post_comment }}" = "true" ]; then
            post_arg="--post --repo ${{ github.repository }}"
          fi
          set +e
          python -m scripts.quality_gate.run \
            --artifacts-dir artifacts \
            --head-sha "${GITHUB_SHA}" \
            pr \
            --pr "${{ github.event.pull_request.number }}" \
            $baseline_arg \
            $post_arg
          verdict_rc=$?
          set -e
          echo "quality-gate verdict exit code: $verdict_rc (0=green, 1=yellow, 2=red, 3=unknown)"
          if [ "${{ inputs.fail_on_red }}" != "true" ]; then
            exit 0
          fi
          case "$verdict_rc" in
            0|1|3) ;;
            2)
              echo "::error::quality-gate verdict is RED" >&2
              exit 1
              ;;
            *)
              echo "::error::quality-gate unexpected exit $verdict_rc" >&2
              exit 1
              ;;
          esac
