name: Optimizr dependency policy
description: Validate Python/Node lockfiles and enforce Trivy vulnerability and license policy
inputs:
  working_directory:
    description: Repository-relative project directory containing the package manifest and lockfile
    required: false
    default: "."
  policy_file:
    description: Optional repository-relative dependency policy JSON
    required: false
    default: ""
  trivy_version:
    description: Controlled Trivy version
    required: false
    default: v0.70.0
  evidence_dir:
    description: Sanitized repository-relative evidence directory
    required: false
    default: artifacts/dependency-policy
outputs:
  evidence_dir:
    description: Evidence directory
    value: ${{ inputs.evidence_dir }}
runs:
  using: composite
  steps:
    - name: Resolve confined dependency root
      id: root
      shell: bash
      env:
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        case "$WORKING_DIRECTORY" in
          ""|/*|*".."*) echo "::error::working_directory must be repository relative"; exit 2 ;;
        esac
        candidate="$GITHUB_WORKSPACE/$WORKING_DIRECTORY"
        root="$(realpath -e "$candidate")"
        case "$root" in
          "$GITHUB_WORKSPACE"|"$GITHUB_WORKSPACE"/*) ;;
          *) echo "::error::working_directory resolves outside the repository"; exit 2 ;;
        esac
        if [ ! -d "$root" ] || [ -L "$candidate" ]; then
          echo "::error::working_directory must be a non-symlink directory"; exit 2
        fi
        echo "root=$root" >> "$GITHUB_OUTPUT"
    - name: Install controlled Trivy
      uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567
      with:
        version: ${{ inputs.trivy_version }}
        cache: "true"
        path: ${{ runner.temp }}/optimizr-trivy/${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}
    - name: Validate lockfile synchronization
      shell: bash
      env:
        EVIDENCE_DIR: ${{ inputs.evidence_dir }}
        DEPENDENCY_ROOT: ${{ steps.root.outputs.root }}
      run: |
        set -euo pipefail
        action_root="$(cd "$GITHUB_ACTION_PATH/../../.." && pwd)"
        policy_tool="$action_root/scripts/dependency_policy/policy.py"
        mapfile -t ecosystems < <(python3 "$policy_tool" detect --root "$DEPENDENCY_ROOT")
        cd "$DEPENDENCY_ROOT"
        for ecosystem in "${ecosystems[@]}"; do
          case "$ecosystem" in
            python-uv)
              python3 -m pip install --disable-pip-version-check --user 'uv==0.8.3'
              export PATH="$HOME/.local/bin:$PATH"
              uv lock --check
              ;;
            python-poetry)
              python3 -m pip install --disable-pip-version-check --user 'poetry==2.1.4'
              export PATH="$HOME/.local/bin:$PATH"
              poetry check --lock
              ;;
            node-pnpm)
              corepack enable
              corepack prepare 'pnpm@10.13.1' --activate
              pnpm install --lockfile-only --ignore-scripts --frozen-lockfile
              git diff --exit-code -- pnpm-lock.yaml
              ;;
            node-npm)
              python3 "$policy_tool" validate-npm-lock --root "$DEPENDENCY_ROOT"
              npm install --package-lock-only --ignore-scripts --no-audit --no-fund
              git diff --exit-code -- package-lock.json
              ;;
            node-yarn)
              corepack enable
              corepack prepare 'yarn@4.9.2' --activate
              yarn install --immutable --mode=skip-builds
              git diff --exit-code -- yarn.lock
              ;;
            *) echo "::error::unsupported ecosystem: $ecosystem"; exit 2 ;;
          esac
        done
        mkdir -p "$GITHUB_WORKSPACE/$EVIDENCE_DIR"
    - name: Generate dependency vulnerability and license report
      shell: bash
      env:
        EVIDENCE_DIR: ${{ inputs.evidence_dir }}
        DEPENDENCY_ROOT: ${{ steps.root.outputs.root }}
      run: |
        set -euo pipefail
        trivy filesystem \
          --scanners vuln,license \
          --license-full \
          --format json \
          --exit-code 0 \
          --output "$GITHUB_WORKSPACE/$EVIDENCE_DIR/trivy-dependencies.json" \
          "$DEPENDENCY_ROOT"
    - name: Enforce reviewed dependency policy
      shell: bash
      env:
        POLICY_FILE: ${{ inputs.policy_file }}
        EVIDENCE_DIR: ${{ inputs.evidence_dir }}
        DEPENDENCY_ROOT: ${{ steps.root.outputs.root }}
      run: |
        set -euo pipefail
        action_root="$(cd "$GITHUB_ACTION_PATH/../../.." && pwd)"
        policy="$POLICY_FILE"
        if [ -z "$policy" ]; then
          policy="$action_root/policies/dependency-policy.default.json"
        elif [[ "$policy" = /* || "$policy" = *".."* ]]; then
          echo "::error::policy_file must be repository relative"; exit 2
        else
          policy="$(realpath -e "$GITHUB_WORKSPACE/$policy")"
          case "$policy" in
            "$GITHUB_WORKSPACE"/*) ;;
            *) echo "::error::policy_file resolves outside the repository"; exit 2 ;;
          esac
        fi
        python3 "$action_root/scripts/dependency_policy/policy.py" evaluate \
          --root "$DEPENDENCY_ROOT" \
          --report "$GITHUB_WORKSPACE/$EVIDENCE_DIR/trivy-dependencies.json" \
          --policy "$policy" \
          --output "$GITHUB_WORKSPACE/$EVIDENCE_DIR/evidence.json" \
          --repository "$GITHUB_REPOSITORY" \
          --head-sha "$GITHUB_SHA"
