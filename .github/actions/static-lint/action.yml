name: Optimizr static lint
description: Run checksum-verified ShellCheck, actionlint, and composite metadata validation
inputs:
  shellcheck_severity:
    description: Minimum ShellCheck severity
    required: false
    default: warning
  exclusions:
    description: Newline-separated repository-relative exclusion globs
    required: false
    default: ""
  evidence_dir:
    description: Sanitized lint evidence directory
    required: false
    default: artifacts/static-lint
outputs:
  evidence_dir:
    description: Evidence directory
    value: ${{ inputs.evidence_dir }}
runs:
  using: composite
  steps:
    - name: Install controlled lint tools
      id: tools
      shell: bash
      run: |
        set -euo pipefail
        machine="$(uname -m)"
        case "$machine" in
          x86_64|amd64)
            shellcheck_url="https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz"
            shellcheck_sha="8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198"
            actionlint_url="https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz"
            actionlint_sha="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
            ;;
          aarch64|arm64)
            shellcheck_url="https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.aarch64.tar.xz"
            shellcheck_sha="12b331c1d2db6b9eb13cfca64306b1b157a86eb69db83023e261eaa7e7c14588"
            actionlint_url="https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_arm64.tar.gz"
            actionlint_sha="325e971b6ba9bfa504672e29be93c24981eeb1c07576d730e9f7c8805afff0c6"
            ;;
          *) echo "::error::unsupported architecture: $machine"; exit 2 ;;
        esac
        bin_dir="${RUNNER_TEMP:-/tmp}/optimizr-static-lint/bin"
        work_dir="${RUNNER_TEMP:-/tmp}/optimizr-static-lint/downloads"
        rm -rf "$bin_dir" "$work_dir"
        mkdir -p "$bin_dir" "$work_dir"
        curl --fail --location --silent --show-error "$shellcheck_url" -o "$work_dir/shellcheck.tar.xz"
        echo "$shellcheck_sha  $work_dir/shellcheck.tar.xz" | sha256sum -c -
        tar -xJf "$work_dir/shellcheck.tar.xz" --strip-components=1 -C "$bin_dir" --wildcards '*/shellcheck'
        curl --fail --location --silent --show-error "$actionlint_url" -o "$work_dir/actionlint.tar.gz"
        echo "$actionlint_sha  $work_dir/actionlint.tar.gz" | sha256sum -c -
        tar -xzf "$work_dir/actionlint.tar.gz" -C "$bin_dir" actionlint
        chmod 755 "$bin_dir/shellcheck" "$bin_dir/actionlint"
        python3 -m pip install --disable-pip-version-check --user 'PyYAML==6.0.2'
        echo "shellcheck=$bin_dir/shellcheck" >> "$GITHUB_OUTPUT"
        echo "actionlint=$bin_dir/actionlint" >> "$GITHUB_OUTPUT"
    - name: Run blocking static lint
      shell: bash
      env:
        EXCLUSIONS: ${{ inputs.exclusions }}
        SEVERITY: ${{ inputs.shellcheck_severity }}
        EVIDENCE_DIR: ${{ inputs.evidence_dir }}
        SHELLCHECK: ${{ steps.tools.outputs.shellcheck }}
        ACTIONLINT: ${{ steps.tools.outputs.actionlint }}
      run: |
        set -euo pipefail
        python3 "$GITHUB_ACTION_PATH/../../../scripts/static_lint/runner.py" \
          --root "$GITHUB_WORKSPACE" \
          --shellcheck "$SHELLCHECK" \
          --actionlint "$ACTIONLINT" \
          --severity "$SEVERITY" \
          --exclusions "$EXCLUSIONS" \
          --evidence-dir "$EVIDENCE_DIR"
