name: Classify bounded security remediation retry
description: Fail closed unless a retry changes immutable images and its final scan passes

inputs:
  initial_outcome:
    description: Outcome of the initial image security-gate step
    required: true
  initial_classification:
    description: Sanitized initial security-gate classification
    required: false
    default: ""
  initial_fixable_vulnerability_count:
    description: Initial fixable vulnerability count
    required: false
    default: "0"
  initial_unfixed_vulnerability_count:
    description: Initial unfixed vulnerability count
    required: false
    default: "0"
  initial_misconfiguration_count:
    description: Initial misconfiguration count
    required: false
    default: "0"
  initial_secret_count:
    description: Initial secret count
    required: false
    default: "0"
  rebuild_outcome:
    description: Outcome of the bounded Compose rebuild step
    required: false
    default: skipped
  final_outcome:
    description: Outcome of the remediated image security-gate step
    required: false
    default: skipped
  final_classification:
    description: Sanitized remediated image security-gate classification
    required: false
    default: ""
  final_fixable_vulnerability_count:
    description: Final fixable vulnerability count
    required: false
    default: "0"
  final_unfixed_vulnerability_count:
    description: Final unfixed vulnerability count
    required: false
    default: "0"
  final_misconfiguration_count:
    description: Final misconfiguration count
    required: false
    default: "0"
  final_secret_count:
    description: Final secret count
    required: false
    default: "0"
  retry_enabled:
    description: Whether the caller enabled the bounded retry
    required: true
  initial_refs:
    description: Newline-separated sha256 image IDs before the rebuild
    required: false
    default: ""
  remediated_refs:
    description: Newline-separated sha256 image IDs after the rebuild
    required: false
    default: ""

outputs:
  initial_result:
    description: Sanitized initial classification
    value: ${{ steps.classify.outputs.initial_result }}
  rebuild_attempted:
    description: Whether a bounded Compose rebuild was attempted
    value: ${{ steps.classify.outputs.rebuild_attempted }}
  rebuild_result:
    description: passed, failed, skipped, or no_change
    value: ${{ steps.classify.outputs.rebuild_result }}
  final_result:
    description: Sanitized final classification
    value: ${{ steps.classify.outputs.final_result }}
  passed:
    description: true only when a changed image set passes the final scan
    value: ${{ steps.classify.outputs.passed }}
  fixable_vulnerability_count:
    description: Effective fixable vulnerability count
    value: ${{ steps.classify.outputs.fixable_vulnerability_count }}
  unfixed_vulnerability_count:
    description: Effective unfixed vulnerability count
    value: ${{ steps.classify.outputs.unfixed_vulnerability_count }}
  misconfiguration_count:
    description: Effective misconfiguration count
    value: ${{ steps.classify.outputs.misconfiguration_count }}
  secret_count:
    description: Effective secret count
    value: ${{ steps.classify.outputs.secret_count }}

runs:
  using: composite
  steps:
    - id: classify
      shell: bash
      env:
        INITIAL_OUTCOME: ${{ inputs.initial_outcome }}
        INITIAL_CLASSIFICATION: ${{ inputs.initial_classification }}
        INITIAL_FIXABLE_VULNERABILITY_COUNT: ${{ inputs.initial_fixable_vulnerability_count }}
        INITIAL_UNFIXED_VULNERABILITY_COUNT: ${{ inputs.initial_unfixed_vulnerability_count }}
        INITIAL_MISCONFIGURATION_COUNT: ${{ inputs.initial_misconfiguration_count }}
        INITIAL_SECRET_COUNT: ${{ inputs.initial_secret_count }}
        REBUILD_OUTCOME: ${{ inputs.rebuild_outcome }}
        FINAL_OUTCOME: ${{ inputs.final_outcome }}
        FINAL_CLASSIFICATION: ${{ inputs.final_classification }}
        FINAL_FIXABLE_VULNERABILITY_COUNT: ${{ inputs.final_fixable_vulnerability_count }}
        FINAL_UNFIXED_VULNERABILITY_COUNT: ${{ inputs.final_unfixed_vulnerability_count }}
        FINAL_MISCONFIGURATION_COUNT: ${{ inputs.final_misconfiguration_count }}
        FINAL_SECRET_COUNT: ${{ inputs.final_secret_count }}
        RETRY_ENABLED: ${{ inputs.retry_enabled }}
        INITIAL_REFS: ${{ inputs.initial_refs }}
        REMEDIATED_REFS: ${{ inputs.remediated_refs }}
      run: python3 "$GITHUB_ACTION_PATH/retry_result.py" >> "$GITHUB_OUTPUT"
