name: Record sanitized deploy manifest
description: Collect bounded Docker state and atomically record deployment evidence

inputs:
  deploy_path:
    description: Absolute existing deployment directory
    required: true
  compose_file:
    description: Compose file relative to deploy_path
    required: false
    default: docker-compose.yml
  container_name:
    description: Primary container used for the health result
    required: true
  services:
    description: Optional whitespace-separated Compose service allowlist
    required: false
    default: ""
  docker_mode:
    description: direct or sudo
    required: false
    default: sudo
  status:
    description: success or failure from the preceding deployment contract
    required: true
  migration_result:
    description: passed, failed, skipped or not-reported
    required: false
    default: not-reported
  optional_build_result:
    description: passed, failed, skipped or not-reported
    required: false
    default: not-reported
  security_initial_result:
    description: clean, actionable_vulnerability, unfixed_warning, gate_error or not-run
    required: false
    default: not-run
  security_rebuild_attempted:
    description: true when the bounded remediation rebuild ran
    required: false
    default: "false"
  security_rebuild_result:
    description: passed, failed, skipped or no_change
    required: false
    default: skipped
  security_final_result:
    description: clean, actionable_vulnerability, unfixed_warning, gate_error or not-run
    required: false
    default: not-run
  retention:
    description: Immutable manifest files to retain
    required: false
    default: "50"
outputs:
  manifest_path:
    description: Immutable manifest path
    value: ${{ steps.record.outputs.manifest_path }}
  last_successful_path:
    description: Most recent successful deployment pointer
    value: ${{ steps.record.outputs.last_successful_path }}
runs:
  using: composite
  steps:
    - id: record
      name: Collect and record deployment evidence
      shell: bash
      env:
        INPUT_DEPLOY_PATH: ${{ inputs.deploy_path }}
        INPUT_COMPOSE_FILE: ${{ inputs.compose_file }}
        INPUT_CONTAINER_NAME: ${{ inputs.container_name }}
        INPUT_SERVICES: ${{ inputs.services }}
        INPUT_DOCKER_MODE: ${{ inputs.docker_mode }}
        INPUT_STATUS: ${{ inputs.status }}
        INPUT_MIGRATION_RESULT: ${{ inputs.migration_result }}
        INPUT_OPTIONAL_BUILD_RESULT: ${{ inputs.optional_build_result }}
        INPUT_SECURITY_INITIAL_RESULT: ${{ inputs.security_initial_result }}
        INPUT_SECURITY_REBUILD_ATTEMPTED: ${{ inputs.security_rebuild_attempted }}
        INPUT_SECURITY_REBUILD_RESULT: ${{ inputs.security_rebuild_result }}
        INPUT_SECURITY_FINAL_RESULT: ${{ inputs.security_final_result }}
        INPUT_RETENTION: ${{ inputs.retention }}
      run: |
        set -euo pipefail
        action_root="$(cd "$GITHUB_ACTION_PATH/../../.." && pwd)"
        record_output="$(python3 "$action_root/scripts/deploy_manifest/record.py" \
          --deploy-path "$INPUT_DEPLOY_PATH" \
          --compose-file "$INPUT_COMPOSE_FILE" \
          --container-name "$INPUT_CONTAINER_NAME" \
          --services "$INPUT_SERVICES" \
          --docker-mode "$INPUT_DOCKER_MODE" \
          --status "$INPUT_STATUS" \
          --migration-result "$INPUT_MIGRATION_RESULT" \
          --optional-build-result "$INPUT_OPTIONAL_BUILD_RESULT" \
          --retention "$INPUT_RETENTION")"
        printf '%s\n' "$record_output" >> "$GITHUB_OUTPUT"
        manifest_path="$(printf '%s\n' "$record_output" | sed -n 's/^manifest_path=//p')"
        last_successful_path="$(printf '%s\n' "$record_output" | sed -n 's/^last_successful_path=//p')"
        [ -n "$manifest_path" ] && [ -n "$last_successful_path" ] || {
          echo "::error::deploy manifest recorder did not return expected paths" >&2
          exit 2
        }
        python3 "$action_root/scripts/deploy_manifest/remediation.py" \
          --manifest "$manifest_path" \
          --last-successful "$last_successful_path" \
          --status "$INPUT_STATUS" \
          --initial-result "$INPUT_SECURITY_INITIAL_RESULT" \
          --rebuild-attempted "$INPUT_SECURITY_REBUILD_ATTEMPTED" \
          --rebuild-result "$INPUT_SECURITY_REBUILD_RESULT" \
          --final-result "$INPUT_SECURITY_FINAL_RESULT"
