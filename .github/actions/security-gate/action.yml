name: Optimizr security gate
description: Report all Trivy findings and block only actionable security failures

inputs:
  scan_type:
    description: "Scan type: fs or image"
    required: false
    default: "fs"
  scan_ref:
    description: "Filesystem target or fallback image reference"
    required: false
    default: "."
  image_refs:
    description: "Whitespace or newline separated image references/IDs for image scans"
    required: false
    default: ""
  severity:
    description: "Blocking severities"
    required: false
    default: "HIGH,CRITICAL"
  ignore_unfixed:
    description: "Deprecated compatibility input; vulnerabilities without fixes are always signal-only"
    required: false
    default: "true"
  exceptions_file:
    description: "Optional Optimizr JSON exception policy"
    required: false
    default: ""
  trivy_version:
    description: "Controlled Trivy release"
    required: false
    default: "v0.70.0"
  db_max_age_hours:
    description: "Maximum accepted age of the downloaded vulnerability database"
    required: false
    default: "30"
  evidence_dir:
    description: "Directory for reports and sanitized evidence"
    required: false
    default: "artifacts/security-gate"

outputs:
  evidence_dir:
    description: "Directory containing reports and evidence"
    value: ${{ steps.scan.outputs.evidence_dir }}
  result:
    description: "Legacy result: passed or failed"
    value: ${{ steps.scan.outputs.result }}
  classification:
    description: "clean, actionable_vulnerability, unfixed_warning, or gate_error"
    value: ${{ steps.scan.outputs.classification }}
  fixable_vulnerability_count:
    description: "Number of vulnerabilities with an available fixed version"
    value: ${{ steps.scan.outputs.fixable_vulnerability_count }}
  unfixed_vulnerability_count:
    description: "Number of vulnerabilities without an available fixed version"
    value: ${{ steps.scan.outputs.unfixed_vulnerability_count }}
  misconfiguration_count:
    description: "Number of blocking misconfigurations"
    value: ${{ steps.scan.outputs.misconfiguration_count }}
  secret_count:
    description: "Number of detected secrets"
    value: ${{ steps.scan.outputs.secret_count }}

runs:
  using: composite
  steps:
    - name: Install controlled Trivy
      uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567
      with:
        version: ${{ inputs.trivy_version }}
        cache: "true"
        path: ${{ runner.temp }}/optimizr-trivy/${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}

    - name: Run blocking security gate
      id: scan
      shell: bash
      env:
        INPUT_SCAN_TYPE: ${{ inputs.scan_type }}
        INPUT_SCAN_REF: ${{ inputs.scan_ref }}
        INPUT_IMAGE_REFS: ${{ inputs.image_refs }}
        INPUT_SEVERITY: ${{ inputs.severity }}
        INPUT_IGNORE_UNFIXED: ${{ inputs.ignore_unfixed }}
        INPUT_EXCEPTIONS_FILE: ${{ inputs.exceptions_file }}
        INPUT_DB_MAX_AGE_HOURS: ${{ inputs.db_max_age_hours }}
        INPUT_EVIDENCE_DIR: ${{ inputs.evidence_dir }}
      run: |
        set -euo pipefail

        action_root="$(cd "$GITHUB_ACTION_PATH/../../.." && pwd)"
        evidence_tool="$action_root/scripts/security_gate/evidence.py"
        report_tool="$action_root/scripts/security_gate/report.py"
        aggregate_tool="$action_root/scripts/security_gate/aggregate.py"
        repository="${GITHUB_REPOSITORY:-local/unknown}"
        cache_namespace="$(printf '%s' "$repository" | sha256sum | cut -c1-24)"
        cache_root="${XDG_CACHE_HOME:-${HOME:-/tmp}/.cache}/optimizr-security-gate/${cache_namespace}"
        cache_dir="$cache_root/trivy"
        evidence_dir="$INPUT_EVIDENCE_DIR"

        {
          echo "evidence_dir=$evidence_dir"
          echo "result=failed"
          echo "classification=gate_error"
          echo "fixable_vulnerability_count=0"
          echo "unfixed_vulnerability_count=0"
          echo "misconfiguration_count=0"
          echo "secret_count=0"
        } >> "$GITHUB_OUTPUT"

        for path in "$cache_root" "$cache_dir"; do
          if [ -L "$path" ]; then
            echo "::error::security cache path must not be a symbolic link: $path" >&2
            exit 2
          fi
        done
        mkdir -p "$cache_dir" "$evidence_dir"
        if [ "$(stat -c '%u' "$cache_root")" != "$(id -u)" ]; then
          echo "::error::security cache is not owned by the runner user: $cache_root" >&2
          exit 2
        fi
        chmod 700 "$cache_root" "$cache_dir"
        command -v flock >/dev/null 2>&1 || {
          echo "::error::flock is required to protect the shared Trivy cache" >&2
          exit 2
        }
        exec 9>"$cache_root/gate.lock"
        flock -x 9

        case "$INPUT_SCAN_TYPE" in
          fs) scanners="vuln,misconfig,secret" ;;
          image) scanners="vuln,secret" ;;
          *)
            echo "::error::scan_type must be fs or image" >&2
            exit 2
            ;;
        esac
        case "$INPUT_IGNORE_UNFIXED" in
          true|false) ;;
          *)
            echo "::error::ignore_unfixed must be true or false" >&2
            exit 2
            ;;
        esac
        if [ "$INPUT_IGNORE_UNFIXED" = false ]; then
          echo "::notice title=Security policy updated::ignore_unfixed=false is deprecated; vulnerabilities without an available fix remain visible but do not block deployment."
        fi
        if ! [[ "$INPUT_DB_MAX_AGE_HOURS" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
          echo "::error::db_max_age_hours must be numeric" >&2
          exit 2
        fi

        echo "::group::Refresh Trivy vulnerability database"
        trivy --cache-dir "$cache_dir" image --download-db-only
        python3 "$evidence_tool" validate-db \
          --metadata "$cache_dir/db/metadata.json" \
          --max-age-hours "$INPUT_DB_MAX_AGE_HOURS" \
          --output "$evidence_dir/trivy-db.json"
        echo "::endgroup::"

        targets=()
        if [ "$INPUT_SCAN_TYPE" = fs ]; then
          targets+=("$INPUT_SCAN_REF")
        elif [ -n "$INPUT_IMAGE_REFS" ]; then
          while IFS= read -r target; do
            [ -n "$target" ] && targets+=("$target")
          done < <(printf '%s\n' "$INPUT_IMAGE_REFS" | tr '[:space:]' '\n' | sed '/^$/d')
        else
          targets+=("$INPUT_SCAN_REF")
        fi
        if [ "${#targets[@]}" -eq 0 ]; then
          echo "::error::security gate has no targets" >&2
          exit 2
        fi

        trivy_version="$(trivy --version | head -n 1)"
        head_sha="${GITHUB_SHA:-$(git rev-parse HEAD)}"
        aggregate_status=0
        gate_error=0
        summary_paths=()

        for target in "${targets[@]}"; do
          slug="$(printf '%s' "$target" | sha256sum | cut -c1-16)"
          prefix="$evidence_dir/${INPUT_SCAN_TYPE}-${slug}"
          ignore_file="${prefix}-ignore.yaml"
          exception_summary="${prefix}-exceptions.json"
          table_report="${prefix}.txt"
          json_report="${prefix}.json"
          blocking_json_report="${prefix}-blocking.json"
          sarif_report="${prefix}.sarif"
          finding_summary="${prefix}-summary.json"
          evidence_report="${prefix}-evidence.json"
          temporary_image=""

          exception_args=(
            render-exceptions
            --target "$target"
            --output "$ignore_file"
            --summary-output "$exception_summary"
          )
          if [ -n "$INPUT_EXCEPTIONS_FILE" ]; then
            exception_args+=(--source "$INPUT_EXCEPTIONS_FILE")
          fi
          python3 "$evidence_tool" "${exception_args[@]}"

          command_name=filesystem
          target_args=("$target")
          if [ "$INPUT_SCAN_TYPE" = image ]; then
            command_name=image
            if ! docker image inspect "$target" >/dev/null 2>&1; then
              if sudo -n docker image inspect "$target" >/dev/null 2>&1; then
                temporary_image="${RUNNER_TEMP:-/tmp}/trivy-${slug}.tar"
                sudo -n docker save "$target" -o "$temporary_image"
                sudo -n chown "$(id -u):$(id -g)" "$temporary_image"
                target_args=(--input "$temporary_image")
              fi
            fi
          fi

          report_args=(
            --cache-dir "$cache_dir"
            --severity "$INPUT_SEVERITY"
            --ignorefile "$ignore_file"
            --show-suppressed
            --scanners "$scanners"
          )
          blocking_args=("${report_args[@]}" --ignore-unfixed)

          echo "::group::Trivy $INPUT_SCAN_TYPE scan: $target"
          trivy "$command_name" "${report_args[@]}" \
            --format table --exit-code 0 --output "$table_report" \
            "${target_args[@]}"
          if ! python3 - "$table_report" <<'PY'
        import errno
        import os
        import sys
        import time

        report_path = sys.argv[1]
        retryable = {errno.EAGAIN, errno.EWOULDBLOCK}
        deadline = time.monotonic() + 60

        with open(report_path, "rb", buffering=0) as report:
            while chunk := report.read(64 * 1024):
                pending = memoryview(chunk)
                while pending:
                    try:
                        written = os.write(sys.stdout.fileno(), pending)
                    except OSError as exc:
                        if exc.errno not in retryable or time.monotonic() >= deadline:
                            sys.exit(1)
                        time.sleep(0.1)
                        continue
                    if written == 0:
                        sys.exit(1)
                    pending = pending[written:]
        PY
          then
            echo "::warning::Unable to stream complete Trivy table report; full report remains in the security-gate artifact." >&2 || true
          fi
          trivy "$command_name" "${report_args[@]}" \
            --format sarif --exit-code 0 --output "$sarif_report" \
            "${target_args[@]}"
          trivy "$command_name" "${report_args[@]}" \
            --format json --exit-code 0 --output "$json_report" \
            "${target_args[@]}"

          summary_args=(
            --report "$json_report"
            --output "$finding_summary"
          )
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            summary_args+=(--github-summary "$GITHUB_STEP_SUMMARY")
          fi
          python3 "$report_tool" "${summary_args[@]}"
          summary_paths+=("$finding_summary")

          set +e
          trivy "$command_name" "${blocking_args[@]}" \
            --format json --exit-code 1 --output "$blocking_json_report" \
            "${target_args[@]}"
          scan_status=$?
          set -e
          echo "::endgroup::"

          if [ "$scan_status" -gt 1 ]; then
            gate_error=1
          fi

          identity=""
          if [ "$INPUT_SCAN_TYPE" = image ]; then
            identity="$(python3 "$evidence_tool" resolve-image --report "$json_report" 2>/dev/null || true)"
            if [ -z "$identity" ]; then
              identity="$(docker image inspect --format '{{.Id}}' "$target" 2>/dev/null || true)"
            fi
            if [ -z "$identity" ]; then
              identity="$(sudo -n docker image inspect --format '{{.Id}}' "$target" 2>/dev/null || true)"
            fi
            if [ -z "$identity" ]; then
              echo "::error::image scan did not resolve an immutable identity for $target" >&2
              scan_status=2
              gate_error=1
            fi
          fi

          result=passed
          if [ "$scan_status" -ne 0 ]; then
            result=failed
            aggregate_status=1
          fi
          evidence_args=(
            write-evidence
            --output "$evidence_report"
            --repository "$repository"
            --head-sha "$head_sha"
            --scan-type "$INPUT_SCAN_TYPE"
            --target "$target"
            --identity "$identity"
            --severity "$INPUT_SEVERITY"
            --trivy-version "$trivy_version"
            --database "$evidence_dir/trivy-db.json"
            --exception-summary "$exception_summary"
            --report "table=$table_report"
            --report "json=$json_report"
            --report "blocking_json=$blocking_json_report"
            --report "sarif=$sarif_report"
            --report "summary=$finding_summary"
            --result "$result"
            --ignore-unfixed
          )
          python3 "$evidence_tool" "${evidence_args[@]}"
          rm -f "$temporary_image"
        done

        aggregate_args=()
        for summary_path in "${summary_paths[@]}"; do
          aggregate_args+=(--summary "$summary_path")
        done
        if [ "$gate_error" -ne 0 ]; then
          aggregate_args+=(--gate-error)
        fi
        python3 "$aggregate_tool" \
          "${aggregate_args[@]}" \
          --github-output "$GITHUB_OUTPUT"

        if [ "$aggregate_status" -eq 0 ]; then
          echo "result=passed" >> "$GITHUB_OUTPUT"
        else
          echo "result=failed" >> "$GITHUB_OUTPUT"
        fi
        exit "$aggregate_status"
