# Composite: pnpm + Node.js with GHA dependency cache.
# See docs/CI_CACHE_STANDARDS.md §3.3. Prefer over duplicating setup steps in consumers.

name: pnpm-setup
description: Install pnpm and Node.js with cache:pnpm (lockfile-aware when cache_dependency_path is set)

inputs:
  node_version:
    description: Node.js version for setup-node
    required: false
    default: "22"
  pnpm_version:
    description: pnpm version for pnpm/action-setup
    required: false
    default: "10"
  cache_dependency_path:
    description: >-
      Optional lockfile path(s) for setup-node cache (e.g. frontend/apps/storefront/pnpm-lock.yaml).
      Leave empty to let setup-node discover pnpm-lock.yaml from repo root.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      with:
        version: ${{ inputs.pnpm_version }}

    - name: Install Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: ${{ inputs.node_version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.cache_dependency_path }}
